<app-navigation_bar></app-navigation_bar>
<body>
  <div class="title">Math courses</div>
  <div class="container">
    <button
      *ngFor="let route of mathRoutesNames; let i = index"
      class="item"
      [routerLink]="route"
    >
      <img
        class="picture"
        [src]="'../../assets/images/' + mathRoutesNames[i] + '.png'"
      />
      {{ mathTitles[i] }}
    </button>
  </div>
</body>

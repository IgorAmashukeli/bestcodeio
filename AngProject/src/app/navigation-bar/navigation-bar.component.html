<mat-toolbar>
  <div class="navbar">
    <div class="logo-container">
      <img routerLink="/" src="../../assets/images/image.png" alt="BestCode" />
    </div>
    <div class="links-container">
      <a class="home" routerLink="/">Home</a>
      <ng-container>
        <a
          *ngIf="!(auth.loggedIn$ | async)"
          class="math"
          routerLink="/"
          (click)="openWarningDialogClick()"
          >Math</a
        >
        <a *ngIf="auth.loggedIn$ | async" class="math" routerLink="/math"
          >Math</a
        >
      </ng-container>
      <ng-container>
        <a
          *ngIf="!(auth.loggedIn$ | async)"
          class="programming"
          routerLink="/"
          (click)="openWarningDialogClick()"
          >Programming</a
        >
        <a
          *ngIf="auth.loggedIn$ | async"
          class="programming"
          routerLink="/programming"
          >Programming</a
        >
      </ng-container>
    </div>
    <ng-container>
      <button
        *ngIf="!(auth.loggedIn$ | async)"
        class="sign-in-button"
        (click)="openSignInDialogButtonClick()"
      >
        Sign in
      </button>
      <button
        *ngIf="auth.loggedIn$ | async"
        class="sign-in-button"
        (click)="openSignInDialogButtonClick()"
      >
        Sign out
      </button>
    </ng-container>
  </div>
</mat-toolbar>

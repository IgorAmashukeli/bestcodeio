<mat-toolbar>
  <div class="navbar">
    <div class="logo-container">
      <img routerLink="/" src="../../assets/images/image.png" alt="BestCode" />
    </div>
    <div class="links-container">
      <a class="home" routerLink="/">Home</a>
      <a class="math" routerLink="/math">Math</a>
      <a class="programming" routerLink="/programming">Programming</a>
    </div>
    <ng-container>
      <button
        *ngIf="!(auth.loggedIn$ | async)"
        class="sign-in-button"
        (click)="openSignInDialogButtonClick()"
      >
        Sign in
      </button>
      <button
        *ngIf="auth.loggedIn$ | async"
        class="sign-in-button"
        (click)="openSignInDialogButtonClick()"
      >
        Sign out
      </button>
    </ng-container>
  </div>
</mat-toolbar>

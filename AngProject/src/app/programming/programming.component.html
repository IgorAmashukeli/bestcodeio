<app-navigation_bar></app-navigation_bar>
<div class="main-body">
  <div class="title">Programming courses</div>
  <div class="container">
    <button
      *ngFor="let route of programmingRouteNames; let i = index"
      class="item"
      [routerLink]="route"
    >
      <img
        class="picture"
        [src]="'../../assets/images/' + programmingRouteNames[i] + '.png'"
      />
      {{ programmingTitles[i] }}
    </button>
    <div></div>
  </div>
</div>
